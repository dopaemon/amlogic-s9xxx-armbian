#==========================================================================
# Description: Compile mainline beta kernel packages
#==========================================================================

name: Compile mainline beta kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version series."
        required: false
        default: "newest"
        type: choice
        options:
          - newest
          - all
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
  schedule:
    - cron: "23 2 * * 2"

env:
  TZ: Etc/UTC
  RELEASE_TAG: kernel_beta

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set kernel matrix
        id: set-matrix
        run: |
          case "${{ inputs.kernel_version || 'newest' }}" in
            newest) MATRIX='{"include":[{"version":"6.12.y"},{"version":"6.18.y"}]}' ;;
            all) MATRIX='{"include":[{"version":"5.10.y"},{"version":"5.15.y"},{"version":"6.1.y"},{"version":"6.6.y"},{"version":"6.12.y"},{"version":"6.18.y"}]}' ;;
            *) MATRIX='{"include":[{"version":"${{ inputs.kernel_version }}"}]}' ;;
          esac
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build:
    needs: setup
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: beta-${{ matrix.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compile kernel
        uses: ./
        with:
          build_target: kernel
          kernel_source: ophub
          kernel_version: ${{ matrix.version }}
          kernel_auto: true
          kernel_package: all
          kernel_sign: -ophub
          kernel_toolchain: clang
          kernel_config: kernel/kernel-config/release/stable
          kernel_patch: kernel/kernel-patch/beta
          auto_patch: true
          docker_hostpath: ${{ github.workspace }}

      - name: Upload kernel packages
        uses: ophub/upload-to-releases@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: ${{ env.RELEASE_TAG }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*.tar.gz
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
