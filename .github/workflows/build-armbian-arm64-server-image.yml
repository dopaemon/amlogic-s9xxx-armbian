env:
  TZ: Etc/UTC
  ROOTFS_SCRIPT: compile-kernel/tools/script/docker/build_armbian_rootfs_file.sh

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix based on set_release input
        id: set-matrix
        run: |
          if [[ "${{ inputs.set_release }}" == "all" ]]; then
            MATRIX='{"include":[{"release":"trixie","dietpi_image":"DietPi_Container-ARMv8-Trixie.img.xz"},{"release":"bookworm","dietpi_image":"DietPi_Container-ARMv8-Bookworm.img.xz"},{"release":"forky","dietpi_image":"DietPi_Container-ARMv8-Forky.img.xz"}]}'
          else
            case "${{ inputs.set_release }}" in
              trixie) dietpi_image="DietPi_Container-ARMv8-Trixie.img.xz" ;;
              bookworm) dietpi_image="DietPi_Container-ARMv8-Bookworm.img.xz" ;;
              forky) dietpi_image="DietPi_Container-ARMv8-Forky.img.xz" ;;
              *) echo "Unsupported DietPi release: ${{ inputs.set_release }}"; exit 1 ;;
            esac
            MATRIX="{\"include\":[{\"release\":\"${{ inputs.set_release }}\",\"dietpi_image\":\"${dietpi_image}\"}]}"
          fi
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build:
    needs: setup
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    permissions:
      contents: write
      discussions: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    name: build-dietpi-${{ matrix.release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free Disk Space
        if: true
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: true

      - name: Setup Swap Space
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-space-path: /swapfile
          swap-size-gb: 32
          remove-existing-swap-files: true

      - name: Tune Swap Aggressiveness
        run: |
          set -euo pipefail
          sudo sysctl -w vm.swappiness=200
          sudo sysctl -w vm.page-cluster=0
          sudo swapoff /swapfile || true
          sudo swapon -p 32767 /swapfile
          echo "===== Swap Tuning ====="
          cat /proc/sys/vm/swappiness
          cat /proc/sys/vm/page-cluster
          swapon --show --bytes

      - name: Check Initial Disk Space
        run: |
          echo "===== Initial Total Disk Space in GB ====="
          df -BG
      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          #sudo -E apt-get -y full-upgrade
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        run: |
          # Get available space in exact GB
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space on /: ${root_avail}G available"; exit 1; }

          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          echo "Using /: ${root_size}G"

          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download DietPi ARMv8 base image
        id: down
        working-directory: /builder
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        run: |
          mkdir -p build/output/images
          image_name="${{ matrix.dietpi_image }}"
          image_url="https://dietpi.com/downloads/images/${image_name//_/%5F}"
          image_path="build/output/images/${image_name}"
          echo "Downloading ${image_url}"
          curl -fL --retry 5 --retry-delay 10 "${image_url}" -o "${image_path}"
          ls -lh build/output/images
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Set DietPi release tag
        id: tag
        if: ${{ steps.down.outputs.status == 'success' && !cancelled() }}
        run: |
          version_file="/tmp/dietpi-version"
          curl -fsSL https://raw.githubusercontent.com/MichaIng/DietPi/master/.update/version -o "${version_file}"
          # shellcheck disable=SC1090
          source "${version_file}"
          dietpi_version="${G_REMOTE_VERSION_CORE}.${G_REMOTE_VERSION_SUB}.${G_REMOTE_VERSION_RC}"
          echo "build_tag=DietPi_${dietpi_version}_${{ matrix.release }}_arm64_${{ inputs.image_tag_suffix }}_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Repack DietPi for target boards
        uses: ./
        if: ${{ steps.tag.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: armbian
          armbian_path: /builder/build/output/images/${{ matrix.dietpi_image }}
          armbian_board: ${{ inputs.armbian_board }}
          armbian_kernel: ${{ inputs.armbian_kernel }}
          auto_kernel: true
          kernel_repo: ${{ inputs.kernel_repo }}
          kernel_usage: ${{ inputs.kernel_usage }}
          armbian_fstype: ${{ inputs.armbian_fstype }}
          armbian_files: ${{ inputs.armbian_files }}
          builder_name: ${{ inputs.builder_name }}

      - name: Upload rebuilt images to Release
        uses: ophub/upload-to-releases@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: true
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### DietPi TV box image
            - Based on official DietPi ARMv8 image + Ophub TV box resources
            - Default username/password follow DietPi image defaults
            - Installer: `dietpi-install` (`armbian-install` compatibility alias)
            ### Applicable Platform
            - 🐧 `arm64`
            - Credit: https://github.com/ophub/amlogic-s9xxx-armbian
