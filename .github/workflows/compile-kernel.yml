#==========================================================================
# Description: Compile kernel packages
#==========================================================================

name: Compile kernel packages

on:
  workflow_dispatch:
    inputs:
      kernel_type:
        description: "Kernel type."
        required: false
        default: "mainline-stable"
        type: choice
        options:
          - mainline-stable
          - mainline-beta
          - rockchip-rk35xx
          - rockchip-rk3588
      kernel_version:
        description: "Kernel version series."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - newest
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
      kernel_auto:
        description: "Auto use the latest kernel."
        required: false
        default: true
        type: boolean
      delete_source:
        description: "Delete source after compilation."
        required: false
        default: true
        type: boolean
      kernel_package:
        description: "Select compile package list."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - dtbs
      kernel_toolchain:
        description: "Select the compilation toolchain."
        required: false
        default: "gcc"
        type: choice
        options:
          - clang
          - gcc
          - gcc-15.2
          - gcc-14.3
          - gcc-14.2
      ccache_clear:
        description: "Set whether to clear the cache."
        required: false
        default: false
        type: boolean
      docker_image:
        description: "Select Armbian docker image."
        required: false
        default: "resolute"
        type: choice
        options:
          - trixie
          - bookworm
          - resolute
          - noble
  schedule:
    - cron: "17 2 * * 1"

env:
  TZ: Etc/UTC

concurrency:
  group: kernel-${{ github.workflow }}-${{ inputs.kernel_type || 'mainline-stable' }}-${{ inputs.kernel_version || 'all' }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set kernel matrix
        id: set-matrix
        run: |
          kernel_type="${{ inputs.kernel_type || 'mainline-stable' }}"
          kernel_version="${{ inputs.kernel_version || 'all' }}"

          mainline_all='{"include":[{"version":"5.10.y","source":"ophub"},{"version":"5.15.y","source":"ophub"},{"version":"6.1.y","source":"ophub"},{"version":"6.6.y","source":"ophub"},{"version":"6.12.y","source":"ophub"},{"version":"6.18.y","source":"ophub"}]}'
          mainline_newest='{"include":[{"version":"6.12.y","source":"ophub"},{"version":"6.18.y","source":"ophub"}]}'
          rockchip_all='{"include":[{"version":"5.10.y","source":"ophub/linux-5.10.y-rk35xx"},{"version":"6.1.y","source":"ophub/linux-6.1.y-rockchip"}]}'

          case "${kernel_type}" in
            mainline-stable)
              release_tag="kernel_stable"
              kernel_config="kernel/kernel-config/release/stable"
              kernel_patch="false"
              auto_patch="false"
              case "${kernel_version}" in
                all|newest) matrix="${mainline_all}" ;;
                5.10.y|5.15.y|6.1.y|6.6.y|6.12.y|6.18.y) matrix="{\"include\":[{\"version\":\"${kernel_version}\",\"source\":\"ophub\"}]}" ;;
                *) echo "Unsupported stable kernel version: ${kernel_version}"; exit 1 ;;
              esac
              ;;
            mainline-beta)
              release_tag="kernel_beta"
              kernel_config="kernel/kernel-config/release/beta"
              kernel_patch="kernel/kernel-patch/beta"
              auto_patch="true"
              case "${kernel_version}" in
                newest) matrix="${mainline_newest}" ;;
                all) matrix="${mainline_all}" ;;
                5.10.y|5.15.y|6.1.y|6.6.y|6.12.y|6.18.y) matrix="{\"include\":[{\"version\":\"${kernel_version}\",\"source\":\"ophub\"}]}" ;;
                *) echo "Unsupported beta kernel version: ${kernel_version}"; exit 1 ;;
              esac
              ;;
            rockchip-rk35xx)
              release_tag="kernel_rk35xx"
              kernel_config="kernel/kernel-config/release/rk35xx"
              kernel_patch="false"
              auto_patch="false"
              case "${kernel_version}" in
                all|newest) matrix="${rockchip_all}" ;;
                5.10.y) matrix='{"include":[{"version":"5.10.y","source":"ophub/linux-5.10.y-rk35xx"}]}' ;;
                6.1.y) matrix='{"include":[{"version":"6.1.y","source":"ophub/linux-6.1.y-rockchip"}]}' ;;
                *) echo "Unsupported RK35xx kernel version: ${kernel_version}"; exit 1 ;;
              esac
              ;;
            rockchip-rk3588)
              release_tag="kernel_rk3588"
              kernel_config="kernel/kernel-config/release/rk3588"
              kernel_patch="false"
              auto_patch="false"
              case "${kernel_version}" in
                all|newest) matrix="${rockchip_all}" ;;
                5.10.y) matrix='{"include":[{"version":"5.10.y","source":"ophub/linux-5.10.y-rk35xx"}]}' ;;
                6.1.y) matrix='{"include":[{"version":"6.1.y","source":"ophub/linux-6.1.y-rockchip"}]}' ;;
                *) echo "Unsupported RK3588 kernel version: ${kernel_version}"; exit 1 ;;
              esac
              ;;
            *) echo "Unsupported kernel type: ${kernel_type}"; exit 1 ;;
          esac

          matrix="$(jq -c \
            --arg tag "${release_tag}" \
            --arg config "${kernel_config}" \
            --arg patch "${kernel_patch}" \
            --arg auto_patch "${auto_patch}" \
            '.include |= map(. + {release_tag: $tag, config: $config, patch: $patch, auto_patch: $auto_patch})' <<< "${matrix}")"
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  build:
    needs: setup
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    permissions:
      contents: write
      discussions: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: ${{ inputs.kernel_type || 'mainline-stable' }}-${{ matrix.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space on /: ${root_avail}G available"; exit 1; }
          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          echo "Using /: ${root_size}G"
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Get kernel source commit hash
        id: kernelhash
        run: |
          source="${{ matrix.source }}"
          if [[ "${source}" == */* ]]; then
            repo="${source}"
          else
            repo="${source}/linux-${{ matrix.version }}"
          fi
          api_url="https://api.github.com/repos/${repo}/git/ref/heads/main"
          source_hash=$(curl -fsSL -m 20 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "${api_url}" |
              jq -r '.object.sha'
          )
          [[ -z "${source_hash}" || "${source_hash}" == "null" ]] && source_hash="${{ github.sha }}"
          echo "source_hash=${source_hash}" >> "${GITHUB_ENV}"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: /builder/ccache
          key: kernel-${{ inputs.kernel_type || 'mainline-stable' }}-${{ inputs.kernel_toolchain || 'gcc' }}-${{ matrix.version }}-${{ env.source_hash }}
          restore-keys: |
            kernel-${{ inputs.kernel_type || 'mainline-stable' }}-${{ inputs.kernel_toolchain || 'gcc' }}-${{ matrix.version }}-

      - name: Compile kernel
        uses: ./
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: kernel
          kernel_source: ${{ matrix.source }}
          kernel_version: ${{ matrix.version }}
          kernel_auto: ${{ inputs.kernel_auto }}
          delete_source: ${{ inputs.delete_source }}
          kernel_package: ${{ inputs.kernel_package }}
          kernel_sign: -ophub
          kernel_toolchain: ${{ inputs.kernel_toolchain }}
          kernel_config: ${{ matrix.config }}
          kernel_patch: ${{ matrix.patch }}
          auto_patch: ${{ matrix.auto_patch }}
          ccache_clear: ${{ inputs.ccache_clear }}
          docker_hostpath: /builder
          docker_image: ophub/armbian-${{ inputs.docker_image }}:arm64

      - name: Upload kernel packages
        uses: ophub/upload-to-releases@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: ${{ matrix.release_tag }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
