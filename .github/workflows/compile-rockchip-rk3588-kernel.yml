#==========================================================================
# Description: Compile Rockchip RK3588 kernel packages
#==========================================================================

name: Compile Rockchip RK3588 kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version series."
        required: false
        default: "all"
        type: choice
        options:
          - all
          - 5.10.y
          - 6.1.y
  schedule:
    - cron: "37 2 * * 4"

env:
  TZ: Etc/UTC
  RELEASE_TAG: kernel_rk3588

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set kernel matrix
        id: set-matrix
        run: |
          case "${{ inputs.kernel_version || 'all' }}" in
            all) MATRIX='{"include":[{"version":"5.10.y","source":"ophub/linux-5.10.y-rk35xx"},{"version":"6.1.y","source":"ophub/linux-6.1.y-rockchip"}]}' ;;
            5.10.y) MATRIX='{"include":[{"version":"5.10.y","source":"ophub/linux-5.10.y-rk35xx"}]}' ;;
            6.1.y) MATRIX='{"include":[{"version":"6.1.y","source":"ophub/linux-6.1.y-rockchip"}]}' ;;
          esac
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build:
    needs: setup
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: rk3588-${{ matrix.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compile kernel
        uses: ./
        with:
          build_target: kernel
          kernel_source: ${{ matrix.source }}
          kernel_version: ${{ matrix.version }}
          kernel_auto: true
          kernel_package: all
          kernel_sign: -ophub
          kernel_toolchain: clang
          kernel_config: kernel/kernel-config/release/rk3588
          docker_hostpath: ${{ github.workspace }}

      - name: Upload kernel packages
        uses: ophub/upload-to-releases@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: ${{ env.RELEASE_TAG }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*.tar.gz
          allow_updates: true
          remove_artifacts: false
          replaces_artifacts: true
          make_latest: false
          gh_token: ${{ secrets.GITHUB_TOKEN }}
